<!doctype html>
<!--
  skeleton.html — the gold-check scaffold every frontend bundle copies.
  Phase: foundations / STYLE ANCHOR REFERENCE.

  GOAL: a minimal, working, zero-dep demo page with the [check: OK] gold-check
  pattern and the indigo house palette. Copy this to start any bundle.

  Open from: file://.../frontend/{phase}/name.html
  Replace {phase}, the title, the demo body, and the gold-check assertion.
-->
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>skeleton — frontend bundle scaffold</title>
  <style>
    :root {
      --bg: #0d1117;
      --panel: #161b22;
      --ink: #e6edf3;
      --muted: #8b949e;
      --accent: #6366f1;   /* indigo — the frontend section identity color */
      --accent-soft: #312e81;
      --ok: #2ecc71;
      --bad: #e74c3c;
      --line: #30363d;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font: 15px/1.55 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    }
    header {
      padding: 14px 22px;
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      gap: 14px;
      flex-wrap: wrap;
    }
    header h1 { font-size: 16px; margin: 0; color: var(--accent); }
    header .links { margin-left: auto; font-size: 13px; }
    header a { color: var(--muted); text-decoration: none; margin-left: 14px; }
    header a:hover { color: var(--ink); }
    main { padding: 22px; }
    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 18px;
      margin-bottom: 16px;
    }
    .goldcheck {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 5px;
      font-weight: 700;
      border: 1px solid currentColor;
      background: rgba(46, 204, 113, 0.08);
    }
    .badge { display:inline-block; padding:3px 10px; border-radius:6px; font-size:12px;
      font-weight:600; text-decoration:none; border:1px solid var(--line);
      transition:border-color .15s, color .15s; }
    .badge.md { color:var(--accent); border-color:rgba(99,102,241,.5); background:rgba(99,102,241,.10); }
    .badge.md:hover { color:#fff; border-color:var(--accent); background:rgba(99,102,241,.22); }
    .badge.py { color:var(--ok); border-color:rgba(46,204,113,.5); background:rgba(46,204,113,.08); }
    .badge.py:hover { color:#fff; border-color:var(--ok); background:rgba(46,204,113,.22); }
    .guide-callout { margin:0 22px 16px; padding:10px 14px; border-left:3px solid var(--accent);
      background:rgba(99,102,241,.06); border-radius:0 6px 6px 0; font-size:13px;
      color:var(--muted); line-height:1.6; }
    .guide-callout a { color:var(--accent); text-decoration:none; font-weight:600; }
    .guide-callout a:hover { text-decoration:underline; }
    .demo { border: 1px dashed var(--accent); padding: 14px; border-radius: 6px; }
  </style>
</head>
<body>
  <header>
    <h1>concept — skeleton</h1>
    <span id="goldcheck" class="goldcheck">[check: …]</span>
    <div class="links">
      <a href="../index.html">← all frontend</a>
    </div>
  </header>

  <div class="guide-callout">
    📖 This is the gold-check scaffold — copy it to start any bundle, then swap the demo + assertion.
  </div>

  <main>
    <section class="panel">
      <h2>Demo</h2>
      <!-- THE DEMO BODY: the thing this concept teaches, rendered live -->
      <div class="demo" id="demo">
        <div class="item">one</div>
        <div class="item">two</div>
        <div class="item">three</div>
      </div>
    </section>
  </main>

  <script>
    // === GOLD-CHECK (the falsifiable anchor) ===
    // Assert a concrete rendered/DOM fact the bundle pins. Show [check: OK/FAIL].
    (function goldCheck() {
      var demo = document.getElementById("demo");
      var n = demo ? demo.querySelectorAll(".item").length : -1;
      var ok = n === 3;
      var el = document.getElementById("goldcheck");
      el.textContent = "[check] demo has 3 items: " + (ok ? "OK" : "FAIL");
      el.style.color = ok ? "var(--ok)" : "var(--bad)";
      el.style.background = ok ? "rgba(46,204,113,0.08)" : "rgba(231,76,60,0.08)";
    })();
  </script>
</body>
</html>
