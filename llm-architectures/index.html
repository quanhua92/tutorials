<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>LLM Architecture Explorer — Tutorials</title>
<style>
  :root{
    --bg:#0d1117; --panel:#161b22; --ink:#e6edf3; --muted:#8b949e;
    --grid:#21262d; --border:#30363d;
    --accent:#7c3aed; --glow:rgba(124,58,237,.12);
    --qwen:#27ae60; --google:#e67e22; --deepseek:#2980b9;
    --nvidia:#76b900; --microsoft:#00a4ef; --other:#8b5cf6;
  }
  *{box-sizing:border-box; margin:0; padding:0}
  html,body{height:100%; overflow:hidden}
  body{background:var(--bg); color:var(--ink);
       font-family:system-ui,"Segoe UI",Roboto,sans-serif;
       display:flex; flex-direction:column}

  /* ===== TOP BAR ===== */
  .topbar{
    display:flex; align-items:center; gap:.8rem;
    padding:.6rem 1rem;
    background:var(--panel); border-bottom:1px solid var(--border);
    flex-shrink:0; z-index:100;
  }
  .topbar a{color:var(--muted); text-decoration:none; font-size:.85rem; white-space:nowrap}
  .topbar a:hover{color:#58a6ff}
  .topbar h1{font-size:1.1rem; font-weight:700; flex:1;
    background:linear-gradient(90deg,#7c3aed,#60a5fa);
    -webkit-background-clip:text; -webkit-text-fill-color:transparent;
    background-clip:text}
  .models-toggle{
    display:flex; align-items:center; gap:.4rem; margin-left:auto;
    padding:.4rem .8rem; font-size:.8rem; font-weight:600;
    background:var(--bg); border:1px solid var(--border); border-radius:8px;
    color:var(--ink); cursor:pointer; white-space:nowrap;
  }
  .models-toggle:hover{border-color:var(--accent)}
  .models-toggle .count{
    background:var(--accent); color:#fff; border-radius:10px;
    padding:1px 7px; font-size:.7rem;
  }

  /* ===== FILTER BAR ===== */
  .filterbar{
    display:flex; gap:.5rem; align-items:center;
    padding:.5rem 1rem;
    background:var(--panel); border-bottom:1px solid var(--border);
    flex-shrink:0; flex-wrap:wrap;
  }
  .search-box{
    flex:1; min-width:120px; padding:.4rem .7rem; font-size:.85rem;
    background:var(--bg); border:1px solid var(--border); border-radius:8px;
    color:var(--ink); outline:none;
  }
  .search-box:focus{border-color:#58a6ff}
  .search-box::placeholder{color:var(--muted)}
  .filters{display:flex; gap:.3rem; flex-wrap:wrap}
  .filter-btn{
    padding:.25rem .6rem; font-size:.72rem; font-weight:600;
    background:var(--bg); border:1px solid var(--border); border-radius:14px;
    color:var(--muted); cursor:pointer; white-space:nowrap;
    transition:all .12s;
  }
  .filter-btn:hover{border-color:#58a6ff; color:var(--ink)}
  .filter-btn.active{background:var(--accent); border-color:var(--accent); color:#fff}

  /* ===== MAIN LAYOUT ===== */
  .main{flex:1; display:flex; overflow:hidden; position:relative}

  /* ===== SIDEBAR ===== */
  .sidebar{
    width:300px; flex-shrink:0;
    background:var(--panel); border-right:1px solid var(--border);
    overflow-y:auto; overflow-x:hidden;
    transition:transform .25s ease;
  }
  .sidebar::-webkit-scrollbar{width:5px}
  .sidebar::-webkit-scrollbar-track{background:transparent}
  .sidebar::-webkit-scrollbar-thumb{background:var(--border); border-radius:4px}

  .model-item{
    display:flex; flex-direction:column; gap:.15rem;
    padding:.55rem .8rem; cursor:pointer;
    border-bottom:1px solid var(--grid);
    transition:background .1s;
  }
  .model-item:hover{background:var(--grid)}
  .model-item.active{
    background:rgba(124,58,237,.12);
    border-left:3px solid var(--accent);
    padding-left:calc(.8rem - 3px);
  }
  .model-item .mn{font-size:.85rem; font-weight:600; color:var(--ink)}
  .model-item .mn.active{color:var(--accent)}
  .model-item .mt{font-size:.68rem; color:var(--muted); font-family:monospace}
  .model-item .mt .type-tag{
    display:inline-block; padding:0 5px; border-radius:3px;
    font-size:.62rem; font-weight:700; margin-right:4px;
  }
  .model-item .mbadges{
    display:flex; gap:.3rem; margin-top:.15rem;
  }
  .model-item .badge{
    font-size:.58rem; padding:1px 5px; border-radius:3px;
    background:var(--bg); border:1px solid var(--border); color:var(--muted);
    font-weight:600;
  }
  .model-item .badge.qk{color:#34d399; border-color:#064e3b}
  .model-item .badge.moe{color:#fbbf24; border-color:#78350f}
  .model-item .badge.attn{color:#60a5fa}
  .model-item .badge.mlp{color:#a78bfa}

  /* Group colors for left border */
  .model-item[data-group="qwen"] .type-tag{background:rgba(39,174,96,.15); color:var(--qwen)}
  .model-item[data-group="google"] .type-tag{background:rgba(230,126,34,.15); color:var(--google)}
  .model-item[data-group="deepseek"] .type-tag{background:rgba(41,128,185,.15); color:var(--deepseek)}
  .model-item[data-group="nvidia"] .type-tag{background:rgba(118,185,0,.15); color:var(--nvidia)}
  .model-item[data-group="microsoft"] .type-tag{background:rgba(0,164,239,.15); color:var(--microsoft)}
  .model-item[data-group="other"] .type-tag{background:rgba(139,92,246,.15); color:var(--other)}

  /* ===== IFRAME AREA ===== */
  .viewer{flex:1; position:relative; background:var(--bg)}
  .viewer iframe{
    width:100%; height:100%; border:none;
  }
  .viewer-empty{
    display:flex; align-items:center; justify-content:center;
    height:100%; color:var(--muted); font-size:.9rem;
  }

  /* ===== MOBILE OVERLAY ===== */
  .overlay{
    display:none; position:fixed; inset:0;
    background:rgba(0,0,0,.5); z-index:90;
  }

  /* ===== RESPONSIVE ===== */
  @media (max-width:767px){
    .topbar h1{display:none}
    .sidebar{
      position:fixed; top:0; left:0; bottom:0; z-index:100;
      transform:translateX(-100%);
      box-shadow:4px 0 24px rgba(0,0,0,.4);
    }
    .sidebar.open{transform:translateX(0)}
    .overlay.show{display:block;z-index:90}
  }
  @media (min-width:768px){
    .models-toggle{display:none}
  }
</style>
</head>

var activeGroup = "all";
var activeFile = null;

// Build model list
function buildList(){
  var list = document.getElementById("modelList");
  var query = document.getElementById("search").value.toLowerCase().trim();
  list.innerHTML = "";

  var visible = 0;
  MODELS.forEach(function(m){
    var groupMatch = activeGroup === "all" || m.g === activeGroup;
    var searchMatch = !query ||
      m.n.toLowerCase().indexOf(query) >= 0 ||
      m.t.toLowerCase().indexOf(query) >= 0;
    if(!groupMatch || !searchMatch) return;
    visible++;

    var item = document.createElement("div");
    item.className = "model-item" + (activeFile === m.f ? " active" : "");
    item.setAttribute("data-group", m.g);
    item.setAttribute("data-file", m.f);

    var badges = '<div class="mbadges">';
    badges += '<span class="badge attn">' + m.a + '</span>';
    if(m.q === "Y") badges += '<span class="badge qk">QK-Norm</span>';
    if(m.e === "MoE") badges += '<span class="badge moe">MoE</span>';
    badges += '<span class="badge mlp">' + m.m + '</span>';
    badges += '</div>';

    item.innerHTML =
      '<div class="mn">' + m.n + '</div>' +
      '<div class="mt"><span class="type-tag">' + m.g + '</span>' + m.t + ' - ' + m.p + '</div>' +
      badges;

    item.addEventListener("click", function(){
      selectModel(m.f);
    });
    list.appendChild(item);
  });
  document.getElementById("modelCount").textContent = visible;
}

function selectModel(file){
  activeFile = file;
  document.getElementById("frame").src = file;

  // Update active state
  document.querySelectorAll(".model-item").forEach(function(el){
    el.classList.toggle("active", el.getAttribute("data-file") === file);
    var mn = el.querySelector(".mn");
    if(mn) mn.classList.toggle("active", el.getAttribute("data-file") === file);
  });

  // Close sidebar on mobile
  if(window.innerWidth < 768){
    closeSidebar();
  }

  // Update URL hash
  var hashName = file.replace("_viz.html","").replace("_architecture_visualizer.html","").replace(/[^a-z0-9]/gi,"-").toLowerCase();
  history.replaceState(null, "", "#" + hashName);
}

// Sidebar toggle (mobile)
function openSidebar(){
  document.getElementById("sidebar").classList.add("open");
  document.getElementById("overlay").classList.add("show");
}
function closeSidebar(){
  document.getElementById("sidebar").classList.remove("open");
  document.getElementById("overlay").classList.remove("show");
}

document.getElementById("modelsToggle").addEventListener("click", function(){
  var sb = document.getElementById("sidebar");
  if(sb.classList.contains("open")) closeSidebar(); else openSidebar();
});
document.getElementById("overlay").addEventListener("click", closeSidebar);

// Filters
document.getElementById("filters").addEventListener("click", function(e){
  var btn = e.target.closest(".filter-btn");
  if(!btn) return;
  document.querySelectorAll(".filter-btn").forEach(function(b){b.classList.remove("active")});
  btn.classList.add("active");
  activeGroup = btn.dataset.group;
  buildList();
});

// Search
document.getElementById("search").addEventListener("input", buildList);

// Keyboard navigation
document.addEventListener("keydown", function(e){
  if(e.target.tagName === "INPUT") return;
  var items = document.querySelectorAll(".model-item:not(.hidden)");
  // Rebuild filtered list
  var filtered = MODELS.filter(function(m){
    var groupMatch = activeGroup === "all" || m.g === activeGroup;
    var query = document.getElementById("search").value.toLowerCase().trim();
    var searchMatch = !query || m.n.toLowerCase().indexOf(query) >= 0 || m.t.toLowerCase().indexOf(query) >= 0;
    return groupMatch && searchMatch;
  });
  var currentIdx = filtered.findIndex(function(m){return m.f === activeFile});
  if(currentIdx < 0) currentIdx = 0;

  if(e.key === "ArrowDown" && currentIdx < filtered.length - 1){
    e.preventDefault();
    selectModel(filtered[currentIdx + 1].f);
  } else if(e.key === "ArrowUp" && currentIdx > 0){
    e.preventDefault();
    selectModel(filtered[currentIdx - 1].f);
  }
});

// Init: load from hash or default
function init(){
  buildList();
  var hash = window.location.hash.slice(1);
  var target = null;
  if(hash){
    // Try to find matching model
    var normalized = hash.toLowerCase();
    target = MODELS.find(function(m){
      return m.f.toLowerCase().replace(/[^a-z0-9]/g,"-").indexOf(normalized) >= 0 ||
             m.n.toLowerCase().replace(/[^a-z0-9]/g,"-").indexOf(normalized) >= 0;
    });
  }
  if(!target) target = MODELS[0]; // default: hand-crafted reference
  selectModel(target.f);
}

init();
</script>
