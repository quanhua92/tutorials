<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ovk-web — RFC 0001 → Google Vids frontend clone</title>
<style>
  :root{
    --bg:#0a0e14; --panel:#11161f; --panel2:#161d28; --border:#222b3a;
    --text:#e6edf3; --muted:#8b97a7; --green:#27ae60; --orange:#e67e22;
    --blue:#58a6ff; --yellow:#ffea00; --purple:#a371f7;
  }
  *{box-sizing:border-box}
  html,body{margin:0;background:var(--bg);color:var(--text);
    font:15px/1.55 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif}
  code{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
    background:var(--panel2);padding:1px 6px;border-radius:5px;font-size:.85em;color:var(--blue)}
  .hero{padding:34px 32px 20px;border-bottom:1px solid var(--border);max-width:1200px;margin:0 auto}
  .back{display:inline-block;margin-bottom:14px;font-size:.78rem;font-weight:600;
    color:var(--muted);text-decoration:none;border:1px solid var(--border);
    background:var(--panel2);padding:4px 11px;border-radius:7px}
  .back:hover{color:var(--text);border-color:var(--blue)}
  .hero h1{margin:0;font-size:2rem;letter-spacing:-.02em;
    background:linear-gradient(90deg,var(--blue),var(--purple));-webkit-background-clip:text;
    background-clip:text;color:transparent}
  .hero .tag{margin:8px 0 0;color:var(--muted);max-width:780px}
  .hero-links{margin-top:16px;display:flex;gap:8px;flex-wrap:wrap}
  .phase{max-width:1200px;margin:0 auto;padding:24px 32px 6px}
  .phase h2{font-size:.82rem;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);
    font-weight:600;margin:0 0 14px;display:flex;align-items:center;gap:8px}
  .phase h2 .count{background:var(--panel2);color:var(--blue);border-radius:10px;padding:1px 8px;font-size:.72rem}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:14px;padding-bottom:24px}
  .card{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:16px;
    display:flex;flex-direction:column;gap:10px;transition:border-color .15s,transform .15s}
  .card:hover{border-color:var(--blue);transform:translateY(-2px)}
  .card header{display:flex;align-items:baseline;gap:8px;flex-wrap:wrap}
  .card .rfc{font-size:.7rem;font-weight:700;color:var(--orange);background:#3a2a14;
    border:1px solid var(--orange);border-radius:5px;padding:1px 7px}
  .card h3{margin:0;font-size:1rem;font-weight:600;flex:1}
  .card .stem{font-size:.72rem;color:var(--muted)}
  .card p{margin:0;color:var(--muted);font-size:.84rem;flex:1}
  .links{display:flex;gap:6px;flex-wrap:wrap}
  .lnk{text-decoration:none;font-size:.78rem;font-weight:600;padding:4px 10px;border-radius:6px;border:1px solid}
  .lnk.demo{color:var(--yellow);border-color:var(--yellow);background:#3a3414}
  .lnk.guide{color:var(--green);border-color:var(--green);background:#1c3a25}
  .lnk.src{color:var(--blue);border-color:var(--blue);background:#14233a}
  .lnk:hover{opacity:.85}
</style>
</head>
<body>
<div id="app"></div>
<script>
(function(){
  // Registry of bundles. Each card links the interactive demo, the guide, and
  // the ground-truth source. Links are RELATIVE to this file (ovk-web/index.html)
  // so the page works opened directly (file://) OR served from the tutorials root.
  var BUNDLES = [
    { stem:"unit_model", guide:"UNIT_MODEL.md", title:"The symmetric unit model", rfc:"§5.1", phase:"P0 — Anchor",
      blurb:"JSON is data, HTML is animation. Every unit (root + each slide) is a folder with index.html + index.json." },
    { stem:"root_index_json", guide:"ROOT_INDEX_JSON.md", title:"Root index.json", rfc:"§5.2", phase:"P1 — Document Model",
      blurb:"canvas · theme · audio · slide ordering. The root data file." },
    { stem:"slide_index_json", guide:"SLIDE_INDEX_JSON.md", title:"Slide index.json", rfc:"§5.3", phase:"P1 — Document Model",
      blurb:"fields · assets · voiceover · duration. The per-slide data file." },
    { stem:"data_binding", guide:"DATA_BINDING.md", title:"__FIELD__ data binding", rfc:"§5.6", phase:"P1 — Document Model",
      blurb:"How fields reach the HTML: __FIELD__ string replacement (stamping)." },
    { stem:"bare_template", guide:"BARE_TEMPLATE.md", title:"Bare <template> sub-comp", rfc:"§5.4–5.5", phase:"P1 — Document Model",
      blurb:"Why slide index.html is a bare <template>, not an <html> doc." },
    { stem:"timeline_panel", guide:"TIMELINE_PANEL.md", title:"Timeline panel", rfc:"§7", phase:"P2 — Editor Surfaces",
      blurb:"Timeline = a view over (slide order + measured durations)." },
    { stem:"stage_canvas", guide:"STAGE_CANVAS.md", title:"Stage / canvas", rfc:"§7", phase:"P2 — Editor Surfaces",
      blurb:"The live preview surface rendering the active slide." },
    { stem:"properties_panel", guide:"PROPERTIES_PANEL.md", title:"Properties / data panel", rfc:"§7", phase:"P2 — Editor Surfaces",
      blurb:"Live-bind text fields → slide index.json (light DOM patch)." },
    { stem:"html_editor_surface", guide:"HTML_EDITOR_SURFACE.md", title:"HTML editor surface", rfc:"§7", phase:"P2 — Editor Surfaces",
      blurb:"Per-slide HTML editor — the Tier-2 AI surface — + lint gate." },
    { stem:"slide_renderer_interface", guide:"SLIDE_RENDERER_INTERFACE.md", title:"SlideRenderer interface", rfc:"§9", phase:"P3 — Preview & Render",
      blurb:"load / render_at / duration — HF now, ours later, same interface." },
    { stem:"preview_engine", guide:"PREVIEW_ENGINE.md", title:"Preview engine", rfc:"§8", phase:"P3 — Preview & Render",
      blurb:"Drive GSAP timelines from the playhead (real-time, not frame-accurate)." },
    { stem:"audio_sync", guide:"AUDIO_SYNC.md", title:"Audio sync", rfc:"§8", phase:"P3 — Preview & Render",
      blurb:"External <audio> synced via timeupdate — bypasses player muting." },
    { stem:"captions_karaoke", guide:"CAPTIONS_KARAOKE.md", title:"Karaoke captions", rfc:"AGENTS.md", phase:"P3 — Preview & Render",
      blurb:"Word-level GSAP direct color tweens. NO transform/scale/font-size." },
    { stem:"asset_library", guide:"ASSET_LIBRARY.md", title:"Asset library (SHA-256)", rfc:"§5.1", phase:"P4 — Export & Determinism",
      blurb:"Content-addressed assets; drop → SHA ref lands in index.json." },
    { stem:"export_pipeline", guide:"EXPORT_PIPELINE.md", title:"Export pipeline", rfc:"§10", phase:"P4 — Export & Determinism",
      blurb:"Assemble + stamp + voiceover + captions → npx hyperframes render." },
    { stem:"visual_determinism", guide:"VISUAL_DETERMINISM.md", title:"Visual determinism", rfc:"§11", phase:"P4 — Export & Determinism",
      blurb:"Visual (not byte) determinism; perceptual hashing for edit diffs." }
  ];
  var PHASE_ORDER = [
    "P0 — Anchor","P1 — Document Model","P2 — Editor Surfaces",
    "P3 — Preview & Render","P4 — Export & Determinism"
  ];
  function esc(s){return s.replace(/[&<>"']/g,function(c){
    return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c];});}
  function card(b){
    var demo="/ovk-web/bundles/"+b.stem+".html",
        guide="https://github.com/quanhua92/tutorials/blob/main/ovk-web/bundles/"+b.guide,
        src="https://github.com/quanhua92/tutorials/blob/main/ovk-web/bundles/"+b.stem+".ts";
    return '<article class="card">'+
      '<header><span class="rfc">'+esc(b.rfc)+'</span>'+
      '<h3>'+esc(b.title)+'</h3>'+
      '<code class="stem">'+esc(b.stem)+'</code></header>'+
      '<p>'+esc(b.blurb)+'</p>'+
      '<div class="links">'+
        '<a class="lnk demo" href="'+demo+'">▶ demo</a>'+
        '<a class="lnk guide" href="'+guide+'">📖 guide</a>'+
        '<a class="lnk src" href="'+src+'">📄 src</a>'+
      '</div></article>';
  }
  function render(){
    var app=document.getElementById("app"); if(!app) return;
    var byPhase=PHASE_ORDER.map(function(p){return {phase:p,items:BUNDLES.filter(function(b){return b.phase===p;})};});
    var html=
      '<header class="hero">'+
        '<a class="back" href="/">← tutorials</a>'+
        '<h1>ovk-web</h1>'+
        '<p class="tag">From <code>pnpm create vite</code> → a Google-Vids-class scene editor.</p>'+
        '<p class="tag">A concept-builder curriculum walking RFC 0001 one verified idea at a time. '+BUNDLES.length+' concepts · every claim printed by a runnable <code>.ts</code> · every demo gold-checked.</p>'+
        '<div class="hero-links">'+
          '<a class="lnk guide" href="/ovk-web/HOW_TO_RESEARCH.md">📖 HOW_TO_RESEARCH</a>'+
          '<a class="lnk src" href="/ovk-web/TODO.md">📋 TODO</a>'+
          '<a class="lnk src" href="/ovk-web/docs/rfc-0001.md">📜 RFC 0001</a>'+
        '</div>'+
      '</header>';
    for(var i=0;i<byPhase.length;i++){
      var row=byPhase[i];
      html+='<section class="phase"><h2>'+esc(row.phase)+' <span class="count">'+row.items.length+'</span></h2><div class="grid">';
      for(var j=0;j<row.items.length;j++){html+=card(row.items[j]);}
      html+='</div></section>';
    }
    app.innerHTML=html;
  }
  render();
})();
</script>
</body>
</html>
