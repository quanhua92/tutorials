# pnpm-workspace.yaml — the TypeScript curriculum workspace.
#
# Members are added by the orchestrator as phases introduce new deps (mirrors
# rust/Cargo.toml's incremental member pattern). Initial scaffold = core only.
#
# Planned members (added per phase):
#   core      (stdlib-only)   Phases 1–5 + stdlib-only P6/P8 bundles
#   metaprog                   Phase 6 (zod / reflect-metadata / decorators)
#   web                        Phase 7–8 (fetch, ws, hono)
#   db                         Phase 8 (better-sqlite3 / drizzle)
#   hono / drizzle / ioredis   companion library walkthroughs
packages:
  - core
  - metaprog
