<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">

<title>Two Pointers — Interactive Visualization</title>
<style>
  :root{
    --bg:#0d1117; --panel:#161b22; --panel2:#0a0e14; --ink:#e6edf3;
    --muted:#8b949e; --border:#30363d; --grid:#21262d;
    --teal:#1abc9c; --green:#27ae60; --amber:#f59e0b; --red:#c0392b; --blue:#58a6ff;
  }
  *{ box-sizing:border-box; }
  html,body{ margin:0; padding:0; }
  body{
    background:var(--bg); color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    line-height:1.5; padding:0 1rem 4rem;
  }
  a{ color:var(--teal); text-decoration:none; }
  a:hover{ text-decoration:underline; }
  .wrap{ max-width:980px; margin:0 auto; }
  header.top{ display:flex; flex-wrap:wrap; align-items:center; justify-content:space-between;
    gap:.6rem; padding:1.1rem 0 .8rem; border-bottom:1px solid var(--border); }
  header.top .left{ display:flex; align-items:center; gap:.75rem; min-width:0; }
  .back{ color:var(--muted); font-size:.85rem; white-space:nowrap; }
  .back:hover{ color:var(--teal); text-decoration:none; }
  .title{ font-weight:700; font-size:1.2rem; }
  .title .ac{ color:var(--teal); }
  .links{ display:flex; gap:.85rem; font-size:.82rem; }
  .badge{
    display:inline-flex; align-items:center; gap:.3rem;
    font-size:.72rem; font-weight:700; padding:.22rem .55rem; border-radius:9999px;
    border:1px solid var(--green); color:var(--green); background:rgba(39,174,96,.08);
    letter-spacing:.02em;
  }
  .badge.bad{ border-color:var(--red); color:var(--red); background:rgba(192,57,43,.1); }

  .panel{ background:var(--panel); border:1px solid var(--border); border-radius:10px; padding:1rem 1.1rem; margin-top:1.1rem; }
  .panel h2{ margin:.1rem 0 .6rem; font-size:1rem; letter-spacing:.02em; color:var(--muted); font-weight:600; text-transform:uppercase; }

  /* mode selector */
  .modes{ display:flex; gap:.5rem; flex-wrap:wrap; }
  .mode-btn{
    background:var(--panel2); color:var(--ink); border:1px solid var(--border);
    border-radius:8px; padding:.5rem .85rem; cursor:pointer; font-size:.86rem;
    transition:border-color .15s, color .15s, background .15s;
  }
  .mode-btn:hover{ border-color:var(--teal); }
  .mode-btn.active{ background:rgba(26,188,156,.14); border-color:var(--teal); color:var(--teal); }
  .mode-sub{ color:var(--muted); font-size:.8rem; margin-top:.55rem; }

  /* controls */
  .controls{ display:flex; gap:.5rem; align-items:center; flex-wrap:wrap; }
  button.ctrl{
    background:var(--panel2); color:var(--ink); border:1px solid var(--border);
    border-radius:7px; padding:.42rem .9rem; cursor:pointer; font-size:.85rem;
    transition:border-color .15s, color .15s;
  }
  button.ctrl:hover{ border-color:var(--teal); color:var(--teal); }
  button.ctrl:disabled{ opacity:.4; cursor:not-allowed; }
  button.ctrl.primary{ background:var(--teal); color:#04231d; border-color:var(--teal); font-weight:700; }
  button.ctrl.primary:hover{ filter:brightness(1.08); color:#04231d; }
  .step-no{ color:var(--muted); font-size:.82rem; font-variant-numeric:tabular-nums; }

  /* array canvas area */
  .stage{ position:relative; min-height:230px; }
  svg.array{ width:100%; height:230px; display:block; }
  .legend{ display:flex; gap:1rem; flex-wrap:wrap; font-size:.78rem; color:var(--muted); margin-top:.5rem; }
  .legend .dot{ width:11px; height:11px; border-radius:3px; display:inline-block; margin-right:.35rem; vertical-align:-1px; }

  /* info / log */
  .info-grid{ display:grid; grid-template-columns:1fr 1fr; gap:1.1rem; margin-top:1.1rem; }
  @media (max-width:720px){ .info-grid{ grid-template-columns:1fr; } }
  .readout{ font-family:"SF Mono",Menlo,Consolas,monospace; font-size:.82rem; }
  .readout .row{ display:flex; justify-content:space-between; padding:.18rem 0; border-bottom:1px dashed var(--grid); }
  .readout .row span:first-child{ color:var(--muted); }
  .readout .row span:last-child{ color:var(--ink); font-variant-numeric:tabular-nums; }
  .readout .row .hl{ color:var(--teal); font-weight:700; }

  .log{ font-family:"SF Mono",Menlo,Consolas,monospace; font-size:.74rem; }
  .log table{ width:100%; border-collapse:collapse; }
  .log th{ text-align:left; color:var(--muted); font-weight:600; padding:.25rem .4rem; border-bottom:1px solid var(--border); white-space:nowrap; }
  .log td{ padding:.2rem .4rem; border-bottom:1px solid var(--grid); white-space:nowrap; font-variant-numeric:tabular-nums; }
  .log tr.cur td{ background:rgba(26,188,156,.10); color:var(--ink); }
  .log tr.match td{ color:var(--green); font-weight:700; }
  .log .scroller{ max-height:240px; overflow:auto; }

  .note{ font-size:.8rem; color:var(--muted); margin-top:.7rem; }
  .note b{ color:var(--ink); }
  .check-row{ display:flex; align-items:center; gap:.7rem; flex-wrap:wrap; margin-top:1rem; }
  code.kv{ background:var(--panel2); border:1px solid var(--border); border-radius:5px; padding:.1rem .4rem; font-size:.8rem; }
</style>
</head>
<body>
<div class="wrap">

  <header class="top">
    <div class="left">
      <a class="back" href="../index.html">&larr; all tutorials</a>
      <span class="title"><span class="ac">Two Pointers</span> &mdash; Interactive</span>
    </div>
    <div class="links">
      <a href="TWO_POINTERS.md">guide (.md)</a>
      <a href="two_pointers.py">code (.py)</a>
    </div>
  </header>

  <!-- mode + check -->
  <div class="panel">
    <h2>Problem</h2>
    <div class="modes" id="modes">
      <button class="mode-btn active" data-mode="twoSum">P167 &mdash; Two Sum II</button>
      <button class="mode-btn" data-mode="maxArea">P011 &mdash; Container With Most Water</button>
      <button class="mode-btn" data-mode="threeSum">P015 &mdash; 3Sum</button>
    </div>
    <div class="mode-sub" id="modeSub"></div>
    <div class="check-row">
      <span class="badge" id="goldBadge">[check: &hellip;]</span>
      <span class="note">JS recomputes the answer and compares it to <code class="kv">two_pointers.py</code>.</span>
    </div>
  </div>

  <!-- array stage -->
  <div class="panel">
    <h2 id="stageTitle">Array &amp; Pointers</h2>
    <div class="controls" style="margin-bottom:.7rem;">
      <button class="ctrl" id="btnReset">&#8634; reset</button>
      <button class="ctrl primary" id="btnStep">step &rarr;</button>
      <button class="ctrl" id="btnPlay">&#9658; play</button>
      <span class="step-no" id="stepNo">step 0 / 0</span>
    </div>
    <div class="stage">
      <svg class="array" id="svg" viewBox="0 0 900 230" preserveAspectRatio="xMidYMid meet"></svg>
    </div>
    <div class="legend">
      <span><span class="dot" style="background:var(--teal)"></span>left (L)</span>
      <span><span class="dot" style="background:var(--amber)"></span>right (R) / inner</span>
      <span><span class="dot" style="background:var(--blue)"></span>fixed i (3Sum)</span>
      <span><span class="dot" style="background:#3b4250"></span>eliminated</span>
      <span><span class="dot" style="background:var(--green)"></span>match / best</span>
    </div>
    <div class="note" id="moveNote"></div>
  </div>

  <!-- readout + log -->
  <div class="info-grid">
    <div class="panel">
      <h2>State</h2>
      <div class="readout" id="readout"></div>
    </div>
    <div class="panel">
      <h2>Trace log</h2>
      <div class="log"><div class="scroller"><table id="logTbl"></table></div></div>
    </div>
  </div>

</div>

<script>
"use strict";
/* ===========================================================================
   Two Pointers interactive visualization.
   Each problem is reduced to a precomputed STEP LIST so "step" is a pure
   playback.  The core logic (two_sum_ii / max_area / three_sum) is mirrored
   from two_pointers.py and runs identically to produce the gold-check value.
   =========================================================================== */

const PROBLEMS = {
  twoSum: {
    title: "P167 Two Sum II \u2014 converging pointers",
    sub: "Sorted array, find the pair summing to target. Return 1-indexed positions.",
    array: [2, 7, 11, 15],
    extra: { target: 9 },
    gold: [1, 2],
    goldLabel: "two_sum_ii([2,7,11,15], 9) = [1, 2]",
  },
  maxArea: {
    title: "P011 Container With Most Water \u2014 greedy area",
    sub: "Pick two lines to maximize min(h[L],h[R])\u00d7(R\u2212L). Move the shorter side.",
    array: [1, 8, 6, 2, 5, 4, 8, 3, 7],
    extra: {},
    gold: 49,
    goldLabel: "max_area([1,8,6,2,5,4,8,3,7]) = 49",
  },
  threeSum: {
    title: "P015 3Sum \u2014 nested two pointers",
    sub: "Sort, fix i, converge on the rest for target \u2212nums[i]. 3-level dedup.",
    array: [-1, 0, 1, 2, -1, -4],
    extra: {},
    gold: [[-1, -1, 2], [-1, 0, 1]],
    goldLabel: "three_sum([-1,0,1,2,-1,-4]) = [[-1,-1,2],[-1,0,1]]",
  },
};

/* ---- core logic (mirror of two_pointers.py) ----------------------------- */
function twoSumIILookup(numbers, target){
  let l=0,r=numbers.length-1;
  while(l<r){ const s=numbers[l]+numbers[r];
    if(s===target) return [l+1,r+1];
    s<target ? l++ : r--; }
  return [];
}
function maxAreaCalc(height){
  let l=0,r=height.length-1,best=0;
  while(l<r){ const h=Math.min(height[l],height[r]); const a=h*(r-l);
    if(a>best) best=a; height[l]<height[r] ? l++ : r--; }
  return best;
}
function threeSumCalc(nums){
  nums=[...nums].sort((a,b)=>a-b);
  const n=nums.length, out=[];
  for(let i=0;i<n-2;i++){
    if(i>0 && nums[i]===nums[i-1]) continue;
    let l=i+1,r=n-1;
    while(l<r){ const t=nums[i]+nums[l]+nums[r];
      if(t===0){ out.push([nums[i],nums[l],nums[r]]); l++; r--;
        while(l<r&&nums[l]===nums[l-1])l++;
        while(l<r&&nums[r]===nums[r+1])r--;
      } else t<0 ? l++ : r--;
    }
  }
  return out;
}

/* ---- step tracer: records a frame per pointer decision ------------------ */
function buildTrace(mode){
  const P = PROBLEMS[mode];
  if(mode==="twoSum")   return traceTwoSum(P.array, P.extra.target);
  if(mode==="maxArea")  return traceMaxArea(P.array);
  return traceThreeSum(P.array);
}

function traceTwoSum(nums, target){
  const steps=[]; let l=0,r=nums.length-1, elim=new Array(nums.length).fill(false);
  steps.push(frame("init","start: L=0 R="+r, l, r, -1, elim, {sum:"\u2014"}));
  while(l<r){ const s=nums[l]+nums[r];
    if(s===target){ steps.push(frame("match","MATCH sum="+s+" \u2192 ["+(l+1)+","+(r+1)+"]",l,r,-1,elim.slice(),{sum:s,result:[l+1,r+1]})); break; }
    if(s<target){ elim[l]=true; steps.push(frame("moveL","sum="+s+" < "+target+" \u2192 L++",l,r,-1,elim.slice(),{sum:s})); l++; }
    else { elim[r]=true; steps.push(frame("moveR","sum="+s+" > "+target+" \u2192 R--",l,r,-1,elim.slice(),{sum:s})); r--; }
  }
  return steps;
}

function traceMaxArea(height){
  const steps=[]; let l=0,r=height.length-1,best=0, elim=new Array(height.length).fill(false);
  steps.push(frame("init","start: L=0 R="+r, l, r, -1, elim.slice(), {area:"\u2014",bestVal:0}));
  while(l<r){
    const h=Math.min(height[l],height[r]); const w=r-l; const a=h*w;
    const isBest=a>best; if(isBest) best=a;
    let act;
    if(height[l]<height[r]){ act="hL("+height[l]+")<hR("+height[r]+") \u2192 move L (shorter)"; }
    else { act="hR("+height[r]+")\u2264hL("+height[l]+") \u2192 move R (shorter)"; }
    steps.push(frame(isBest?"best":"move", act, l, r, -1, elim.slice(),
                     {area:h+" \u00d7 "+w+" = "+a, bestVal:best}));
    if(height[l]<height[r]){ elim[l]=true; l++; } else { elim[r]=true; r--; }
  }
  return steps;
}

function traceThreeSum(raw){
  const nums=[...raw].sort((a,b)=>a-b);
  const steps=[]; const elim=new Array(nums.length).fill(false);
  steps.push(frame("init","sort: ["+nums.join(", ")+"]",0,nums.length-1,-1,elim,{target:"\u2014"}));
  const n=nums.length;
  for(let i=0;i<n-2;i++){
    if(i>0 && nums[i]===nums[i-1]){ steps.push(frame("skipI","i="+i+" dup of i-1 \u2192 skip", -1,-1,i,elim.slice(),{target:"skip"})); continue; }
    const target=-nums[i];
    steps.push(frame("fixI","fix i="+i+" nums[i]="+nums[i]+" target="+target, i+1,n-1,i,elim.slice(),{target}));
    let l=i+1,r=n-1;
    while(l<r){ const t=nums[i]+nums[l]+nums[r];
      if(t===0){
        steps.push(frame("match","triplet ["+nums[i]+","+nums[l]+","+nums[r]+"] \u2192 record",l,r,i,elim.slice(),{sum:t,triple:[nums[i],nums[l],nums[r]]}));
        l++; r--;
        while(l<r&&nums[l]===nums[l-1]){ steps.push(frame("skipL","skip dup L="+l+" ("+nums[l]+")",l,r,i,elim.slice(),{sum:0})); l++; }
        while(l<r&&nums[r]===nums[r+1]){ steps.push(frame("skipR","skip dup R="+r+" ("+nums[r]+")",l,r,i,elim.slice(),{sum:0})); r--; }
      } else if(t<0){ steps.push(frame("moveL","sum="+t+" < 0 \u2192 L++",l,r,i,elim.slice(),{sum:t})); l++; }
      else { steps.push(frame("moveR","sum="+t+" > 0 \u2192 R--",l,r,i,elim.slice(),{sum:t})); r--; }
    }
  }
  return steps;
}

function frame(kind,desc,L,R,fixI,elim,extra,raw){ return {kind,desc,L,R,fixI,elim,extra,raw}; }

/* ===========================================================================
   Rendering
   =========================================================================== */
const SVG_W=900, SVG_H=230, PAD_L=40, PAD_R=40, TOP=70, BASE=190;
let state = { mode:"twoSum", trace:[], idx:0, timer:null };

function init(){
  document.querySelectorAll(".mode-btn").forEach(b=>{
    b.addEventListener("click", ()=>switchMode(b.dataset.mode));
  });
  document.getElementById("btnStep").addEventListener("click", stepOnce);
  document.getElementById("btnReset").addEventListener("click", reset);
  document.getElementById("btnPlay").addEventListener("click", togglePlay);
  switchMode("twoSum");
  runGoldCheck();
}

function switchMode(mode){
  state.mode=mode; state.idx=0;
  document.querySelectorAll(".mode-btn").forEach(b=>b.classList.toggle("active", b.dataset.mode===mode));
  const P=PROBLEMS[mode];
  document.getElementById("modeSub").textContent = P.sub;
  document.getElementById("stageTitle").textContent = P.title;
  state.trace = buildTrace(mode);
  reset(); runGoldCheck();
}

function reset(){ stopPlay(); state.idx=0; render(); }
function stepOnce(){
  if(state.idx < state.trace.length-1){ state.idx++; render(); }
  else stopPlay();
}
function togglePlay(){
  if(state.timer){ stopPlay(); return; }
  document.getElementById("btnPlay").innerHTML="&#10074;&#10074; pause";
  state.timer=setInterval(()=>{
    if(state.idx>=state.trace.length-1){ stopPlay(); return; }
    state.idx++; render();
  }, 750);
}
function stopPlay(){ if(state.timer){ clearInterval(state.timer); state.timer=null; } document.getElementById("btnPlay").innerHTML="&#9658; play"; }

function render(){
  const tr=state.trace; const f=tr[state.idx]||tr[0];
  const P=PROBLEMS[state.mode];
  document.getElementById("stepNo").textContent = "step "+state.idx+" / "+(tr.length-1);
  renderSVG(f, P);
  renderReadout(f, P);
  renderLog(f);
  document.getElementById("moveNote").innerHTML = noteFor(f, P);
  document.getElementById("btnStep").disabled = state.idx>=tr.length-1;
}

/* SVG array rendering ---------------------------------------------------- */
function renderSVG(f, P){
  const arr = (state.mode==="threeSum") ? [...P.array].sort((a,b)=>a-b) : P.array;
  const svg=document.getElementById("svg");
  const n=arr.length;
  const slot=(SVG_W-PAD_L-PAD_R)/Math.max(1,n);
  const cellW=Math.min(slot,90);
  const totalW=cellW*n;
  const x0=PAD_L + ((SVG_W-PAD_L-PAD_R)-totalW)/2;
  const maxAbs=Math.max(...arr.map(Math.abs),1);
  const isArea = state.mode==="maxArea";

  let parts=[];
  // baseline
  parts.push(`<line x1="${PAD_L}" y1="${BASE}" x2="${SVG_W-PAD_R}" y2="${BASE}" stroke="#30363d" stroke-width="1"/>`);

  arr.forEach((val,ci)=>{
    const x=x0+ci*cellW;
    const cx=x+cellW/2;
    const isElim = f.elim && f.elim[ci];
    const isL = ci===f.L;
    const isR = ci===f.R;
    const isFix = ci===f.fixI;
    const matched = (f.kind==="match" && (isL||isR||isFix)) || (f.kind==="best");

    const boxH=44;
    // bar (for area) or cell box
    if(isArea){
      const barH = Math.max(2, (val/maxAbs)*(BASE-TOP-20));
      const fill = isElim ? "#3b4250" : (matched ? "#27ae60" : (isL||isR ? "#1abc9c" : "#2a323c"));
      parts.push(`<rect x="${cx-3}" y="${BASE-barH}" width="6" height="${barH}" fill="${fill}" rx="2"/>`);
      parts.push(`<text x="${cx}" y="${BASE-barH-6}" text-anchor="middle" font-size="11" fill="#8b949e">${val}</text>`);
    } else {
      const by=BASE-boxH;
      let stroke="#30363d", fillC="#161b22", txt="#e6edf3";
      if(isElim){ fillC="#10151c"; stroke="#2a3138"; txt="#48515e"; }
      if(isL||isR){ stroke="#1abc9c"; }
      if(isFix){ stroke="#58a6ff"; }
      if(matched && (isL||isR||isFix)){ fillC="#0f2e22"; stroke="#27ae60"; txt="#27ae60"; }
      parts.push(`<rect x="${x+3}" y="${by}" width="${cellW-6}" height="${boxH}" rx="6" fill="${fillC}" stroke="${stroke}" stroke-width="${(isL||isR||isFix||matched)?2:1}"/>`);
      parts.push(`<text x="${cx}" y="${by+boxH/2+5}" text-anchor="middle" font-size="15" font-weight="600" fill="${txt}">${val}</text>`);
    }
    // index label
    parts.push(`<text x="${cx}" y="${BASE+16}" text-anchor="middle" font-size="10" fill="#48515e">${ci}</text>`);

    // pointer flags
    if(isFix) parts.push(pointerFlag(cx, BASE+30, "i", "#58a6ff"));
    if(isL)   parts.push(pointerFlag(cx, BASE+ (isFix?44:30), "L", "#1abc9c"));
    if(isR)   parts.push(pointerFlag(cx, BASE+ (isFix?58:44), "R", "#f59e0b"));

    // elimination marker
    if(isElim && !isArea){
      parts.push(`<text x="${cx}" y="${BASE-boxH-8}" text-anchor="middle" font-size="10" fill="#48515e">\u2715</text>`);
    }
  });

  // bracket between L and R for area / two-sum
  if(state.mode!=="threeSum" && f.L>=0 && f.R>=0 && f.L<f.R){
    const xl=x0+f.L*cellW+cellW/2, xr=x0+f.R*cellW+cellW/2;
    parts.push(`<path d="M${xl} ${BASE-2} L${xl} ${BASE+8} L${xr} ${BASE+8} L${xr} ${BASE-2}" fill="none" stroke="#1abc9c" stroke-width="1" opacity=".5"/>`);
  }

  svg.innerHTML = parts.join("");
}
function pointerFlag(cx,y,label,color){
  return `<g><rect x="${cx-9}" y="${y}" width="18" height="14" rx="3" fill="${color}"/><text x="${cx}" y="${y+11}" text-anchor="middle" font-size="9" font-weight="700" fill="#0d1117">${label}</text></g>`;
}

/* readout + log ---------------------------------------------------------- */
function renderReadout(f, P){
  const el=document.getElementById("readout");
  let rows=[];
  rows.push(row("step", state.idx));
  rows.push(row("kind", f.kind));
  if(state.mode==="twoSum"){
    rows.push(row("target", P.extra.target));
    rows.push(row("num[L]+num[R]", f.extra.sum));
    if(f.extra.result) rows.push(rowHL("result (1-idx)", "["+f.extra.result.join(", ")+"]"));
  } else if(state.mode==="maxArea"){
    rows.push(row("h\u00d7w = area", f.extra.area!==undefined?f.extra.area:"\u2014"));
    rows.push(rowHL("best so far", f.extra.bestVal!==undefined?f.extra.bestVal:"\u2014"));
  } else {
    rows.push(row("fixed i", f.fixI>=0?f.fixI:"\u2014"));
    if(f.extra.target!==undefined) rows.push(row("inner target", f.extra.target));
    if(f.extra.triple) rows.push(rowHL("triplet", "["+f.extra.triple.join(", ")+"]"));
  }
  el.innerHTML = rows.join("");
}
function row(k,v){ return `<div class="row"><span>${k}</span><span>${v}</span></div>`; }
function rowHL(k,v){ return `<div class="row"><span>${k}</span><span class="hl">${v}</span></div>`; }

function renderLog(f){
  const tr=state.trace;
  const tbl=document.getElementById("logTbl");
  let head="<thead><tr>"+["#","desc"].map(h=>`<th>${h}</th>`).join("")+"</tr></thead>";
  let body="<tbody>";
  tr.forEach((s,i)=>{
    const cls = (i===state.idx?"cur ":"") + (s.kind==="match"?"match":"");
    body += `<tr class="${cls.trim()}"><td>${i}</td><td>${escapeHtml(s.desc)}</td></tr>`;
  });
  body+="</tbody>";
  tbl.innerHTML = head+body;
  // scroll current into view
  const cur=tbl.querySelector("tr.cur");
  if(cur) cur.scrollIntoView({block:"nearest"});
}
function escapeHtml(s){ return String(s).replace(/[&<>]/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c])); }

function noteFor(f, P){
  if(f.kind==="init")   return `Initial state. Press <b>step</b> to converge the pointers.`;
  if(f.kind==="match")  return `<b>Match!</b> ${f.desc}`;
  if(f.kind==="best")   return `<b>New best area.</b> ${f.desc}`;
  if(f.kind==="fixI")   return `<b>3Sum:</b> ${f.desc}. Now run converging pointers on the right side.`;
  if(f.kind==="skipI")  return `<b>Dedup:</b> ${f.desc} \u2014 same first element would repeat triplets.`;
  if(f.kind==="skipL"||f.kind==="skipR") return `<b>Dedup:</b> ${f.desc}`;
  if(f.kind==="moveL")  return `<b>Eliminated:</b> ${f.desc} (the L column cannot be part of any better pair).`;
  if(f.kind==="moveR")  return `<b>Eliminated:</b> ${f.desc} (the R column cannot be part of any better pair).`;
  return f.desc;
}

/* ---- gold check -------------------------------------------------------- */
function runGoldCheck(){
  const mode=state.mode; const P=PROBLEMS[mode];
  let computed, ok=false, got="";
  try{
    if(mode==="twoSum"){ computed=twoSumIILookup(P.array, P.extra.target); got="["+computed.join(", ")+"]"; ok=JSON.stringify(computed)===JSON.stringify(P.gold); }
    else if(mode==="maxArea"){ computed=maxAreaCalc(P.array); got=String(computed); ok=computed===P.gold; }
    else { computed=threeSumCalc(P.array); got=JSON.stringify(computed); ok=JSON.stringify(computed)===JSON.stringify(P.gold); }
  }catch(e){ got="ERROR "+e.message; }
  const badge=document.getElementById("goldBadge");
  badge.className="badge"+(ok?"":" bad");
  badge.textContent = ok ? "[check: OK] \u2713 JS = .py" : "[check: FAIL] "+got;
  badge.title = P.goldLabel + "  |  JS got: " + got;
}

document.addEventListener("DOMContentLoaded", init);
