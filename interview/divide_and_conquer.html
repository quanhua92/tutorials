<style>
  :root{

    --muted:#8b949e; --border:#30363d; --grid:#21262d;

  }

  html,body{ margin:0; padding:0; }
  body{
    background:var(--bg); color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    line-height:1.5; padding:0 1rem 4rem;
  }

  header.top{ display:flex; flex-wrap:wrap; align-items:center; justify-content:space-between;
    gap:.6rem; padding:1.1rem 0 .8rem; border-bottom:1px solid var(--border); }

  .back{ color:var(--muted); font-size:.85rem; white-space:nowrap; }
  .back:hover{ color:var(--teal); text-decoration:none; }

    display:inline-flex; align-items:center; gap:.3rem;

  .panel{ background:var(--panel); border:1px solid var(--border); border-radius:10px; padding:1rem 1.1rem; margin-top:1.1rem; }
  .panel h2{ margin:.1rem 0 .6rem; font-size:1rem; letter-spacing:.02em; color:var(--muted); font-weight:600; text-transform:uppercase; }

  .modes{ display:flex; gap:.5rem; flex-wrap:wrap; }
  .mode-btn{
    background:var(--panel2); color:var(--ink); border:1px solid var(--border);
    border-radius:8px; padding:.5rem .85rem; cursor:pointer; font-size:.86rem;
    transition:border-color .15s, color .15s, background .15s;
  }
  .mode-btn:hover{ border-color:var(--teal); }
  .mode-btn.active{ background:rgba(26,188,156,.14); border-color:var(--teal); color:var(--teal); }
  .mode-sub{ color:var(--muted); font-size:.8rem; margin-top:.55rem; }

  .controls{ display:flex; gap:.5rem; align-items:center; flex-wrap:wrap; }

    background:var(--panel2); color:var(--ink); border:1px solid var(--border);
    border-radius:7px; padding:.42rem .9rem; cursor:pointer; font-size:.85rem;
    transition:border-color .15s, color .15s;
  }
  button.ctrl:hover{ border-color:var(--teal); color:var(--teal); }
  button.ctrl:disabled{ opacity:.4; cursor:not-allowed; }
  button.ctrl.primary{ background:var(--teal); color:#04231d; border-color:var(--teal); font-weight:700; }
  button.ctrl.primary:hover{ filter:brightness(1.08); color:#04231d; }

  .stage{ position:relative; }
  svg.canvas{ width:100%; display:block; }
  .legend{ display:flex; gap:1rem; flex-wrap:wrap; font-size:.78rem; color:var(--muted); margin-top:.5rem; }
  .legend .dot{ width:11px; height:11px; border-radius:3px; display:inline-block; margin-right:.35rem; vertical-align:-1px; }

  .info-grid{ display:grid; grid-template-columns:1fr 1fr; gap:1.1rem; margin-top:1.1rem; }

  .readout{ font-family:"SF Mono",Menlo,Consolas,monospace; font-size:.82rem; }

  .readout .row span:first-child{ color:var(--muted); }
  .readout .row span:last-child{ color:var(--ink); font-variant-numeric:tabular-nums; text-align:right; word-break:break-all; }
  .readout .row .hl{ color:var(--teal); font-weight:700; }
  .readout .row .gd{ color:var(--green); font-weight:700; }
  .readout .row .bd{ color:var(--red); font-weight:700; }
  .readout .row .am{ color:var(--amber); font-weight:700; }

  .log{ font-family:"SF Mono",Menlo,Consolas,monospace; font-size:.74rem; }

  .note{ font-size:.8rem; color:var(--muted); margin-top:.7rem; }

  code.kv{ background:var(--panel2); border:1px solid var(--border); border-radius:5px; padding:.1rem .4rem; font-size:.8rem; }

<body>
<div class="wrap">

  <header class="top">
    <div class="left">
      <a class="back" href="./index.html">&larr; all tutorials</a>
      <span class="title"><span class="ac">Divide &amp; Conquer</span> &mdash; Interactive</span>
    </div>
    <div class="links">
      <a href="https://github.com/quanhua92/tutorials/blob/main/interview/DIVIDE_AND_CONQUER.md">guide (.md)</a>
      <a href="https://github.com/quanhua92/tutorials/blob/main/interview/divide_and_conquer.py">code (.py)</a>
    </div>
  </header>

  <!-- problem + check -->
  <div class="panel">
    <h2>Problem</h2>
    <div class="modes" id="modes">
      <button class="mode-btn active" data-mode="p912">P912 &mdash; Merge Sort</button>
      <button class="mode-btn" data-mode="p169">P169 &mdash; Majority (Boyer-Moore)</button>
      <button class="mode-btn" data-mode="p023">P023 &mdash; Merge k Lists</button>
    </div>
    <div class="mode-sub" id="modeSub"></div>
    <div class="check-row">
      <span class="badge" id="goldBadge">[check: &hellip;]</span>
      <span class="note">JS recomputes the answer and compares it to <code class="kv">divide_and_conquer.py</code>.</span>
    </div>
  </div>

  <!-- stage -->
  <div class="panel">
    <h2 id="stageTitle">Split / Merge Tree</h2>
    <div class="controls" style="margin-bottom:.7rem;">
      <button class="ctrl" id="btnReset">&#8634; reset</button>
      <button class="ctrl primary" id="btnStep">step &rarr;</button>
      <button class="ctrl" id="btnPlay">&#9658; play</button>
      <button class="ctrl" id="btnFinish">&#8862; finish</button>
      <span class="step-no" id="stepNo">step 0 / 0</span>
    </div>
    <div class="stage">
      <svg class="canvas" id="svg" viewBox="0 0 1000 420" preserveAspectRatio="xMidYMid meet"></svg>
    </div>
    <div class="legend" id="legend"></div>
    <div class="note" id="moveNote"></div>
  </div>

  <!-- readout + log -->
  <div class="info-grid">
    <div class="panel">
      <h2>State</h2>
      <div class="readout" id="readout"></div>
    </div>
    <div class="panel">
      <h2>Trace log</h2>
      <div class="log"><div class="scroller"><table id="logTbl"></table></div></div>
    </div>
  </div>

</div>

<script>
"use strict";
/* ===========================================================================
   Divide & Conquer interactive visualization.
   Three modes share one engine:
     p912 — merge sort recursion tree (split -> recurse -> merge)
     p169 — Boyer-Moore linear scan (candidate / count meter)
     p023 — D&C merge-k-lists tree (pair up lists tournament-bracket style)

   The core logic (mergeTwo / mergeSort / majority / mergeK) is mirrored from
   divide_and_conquer.py and runs identically to produce the gold-check value.
   =========================================================================== */

const PROBLEMS = {
  p912: {
    title: "P912 Sort an Array \u2014 merge sort (split \u2192 recurse \u2192 merge)",
    sub: "Halve the array recursively; merge two sorted halves with two pointers. Each element is touched once per level \u2192 O(n log n).",
    kind: "tree",
    gold: "1,2,3,4,5,6",
    goldLabel: "merge_sort([5,2,3,1,6,4]) = [1,2,3,4,5,6]",
  },
  p169: {
    title: "P169 Majority Element \u2014 Boyer-Moore voting",
    sub: "Single pass, O(n) time / O(1) space. +1 on match, \u22121 on mismatch; when count hits 0 seed a new candidate. The majority ( > n/2 ) always survives.",
    kind: "linear",
    gold: "2",
    goldLabel: "majority_element([2,2,1,1,1,2,2]) = 2",
  },
  p023: {
    title: "P023 Merge k Sorted Lists \u2014 D&C on the list-of-lists",
    sub: "Pair up the k lists tournament-bracket style; merge two flat results each node. Depth log\u2082k, O(n) work per level \u2192 O(n log k).",
    kind: "tree",
    gold: "1,1,2,3,4,4,5,6",
    goldLabel: "merge_k([[1,4,5],[1,3,4],[2,6]]) = [1,1,2,3,4,4,5,6]",
  },
};

/* ---- core logic (mirror of divide_and_conquer.py) ------------------------ */
function mergeTwo(a, b){
  const out=[]; let i=0,j=0;
  while(i<a.length && j<b.length){
    if(a[i]<=b[j]){ out.push(a[i]); i++; } else { out.push(b[j]); j++; }
  }
  while(i<a.length) out.push(a[i++]);
  while(j<b.length) out.push(b[j++]);
  return out;
}
function mergeSortCalc(nums){
  if(nums.length<=1) return nums.slice();
  const mid=nums.length>>1;
  return mergeTwo(mergeSortCalc(nums.slice(0,mid)), mergeSortCalc(nums.slice(mid)));
}
function majorityCalc(nums){
  let cand=nums[0], cnt=1;
  for(let k=1;k<nums.length;k++){
    if(cnt===0){ cand=nums[k]; cnt=1; }
    else if(nums[k]===cand){ cnt++; }
    else { cnt--; }
  }
  return cand;
}
function mergeKCalc(lists){
  if(lists.length===0) return [];
  if(lists.length===1) return lists[0].slice();
  const mid=lists.length>>1;
  return mergeTwo(mergeKCalc(lists.slice(0,mid)), mergeKCalc(lists.slice(mid)));
}

/* ===========================================================================
   Tree builder — shared by p912 (merge sort) and p023 (merge k lists).
   Produces nodes + an ordered event list matching the .py trace order:
   split, [recurse left fully], [recurse right fully], merge.
   =========================================================================== */
function buildTree(leaves){
  const nodes=[]; const events=[];
  let evCounter=0;
  function rec(leafSlice, depth){
    const node={ id:nodes.length, depth, input: null, result:null,
                 isLeaf:false, left:null, right:null,
                 revealIdx:-1, doneIdx:-1 };
    nodes.push(node);
    if(leafSlice.length===1){
      node.isLeaf=true; node.result=leafSlice[0].slice();
      node.input=leafSlice[0].slice();
      node.revealIdx=evCounter; node.doneIdx=evCounter;
      events.push({type:"base", node, depth, desc:"base "+fmt(node.input)+" \u2192 already sorted"});
      evCounter++;
      return node;
    }
    const mid=leafSlice.length>>1;
    const leftLeaves=leafSlice.slice(0,mid), rightLeaves=leafSlice.slice(mid);
    node.input=leafSlice;                       // conceptual group (for log text)
    node.revealIdx=evCounter;
    events.push({type:"split", node, depth,
      desc:"split k="+leafSlice.length+" mid="+mid+" \u2192 "+fmtGroup(leftLeaves)+" | "+fmtGroup(rightLeaves),
      leftLeaves, rightLeaves});
    evCounter++;
    node.left=rec(leftLeaves, depth+1);
    node.right=rec(rightLeaves, depth+1);
    node.result=mergeTwo(node.left.result, node.right.result);
    node.doneIdx=evCounter;
    events.push({type:"merge", node, depth,
      desc:"merge "+fmt(node.left.result)+" + "+fmt(node.right.result)+" \u2192 "+fmt(node.result)});
    evCounter++;
    return node;
  }
  const root=rec(leaves, 0);
  return {root, nodes, events};
}

/* ---- layout: assign x by in-order leaf position -------------------------- */
function layoutTree(root){
  let leafCount=0;
  (function assign(n){
    if(n.isLeaf){ n.leafX=leafCount++; return n.leafX; }
    const lx=assign(n.left), rx=assign(n.right);
    n.leafX=(lx+rx)/2; return n.leafX;
  })(root);
  return leafCount;
}

/* ===========================================================================
   Linear builder for p169 (Boyer-Moore). One event per scanned element.
   =========================================================================== */
function buildMajorityTrace(nums){
  const events=[]; const states=[];
  let cand=nums[0], cnt=1;
  states.push({i:0, num:nums[0], cand, cnt, action:"start"});
  events.push({type:"start", idx:0, desc:"start \u2192 candidate="+cand+" count="+cnt});
  for(let k=1;k<nums.length;k++){
    let action;
    if(cnt===0){ cand=nums[k]; cnt=1; action="count == 0 \u2192 new candidate"; }
    else if(nums[k]===cand){ cnt++; action="same \u2192 count++"; }
    else { cnt--; action="diff \u2192 count--"; }
    states.push({i:k, num:nums[k], cand, cnt, action});
    events.push({type: action.indexOf("new")>=0?"seed":(action.indexOf("same")>=0?"up":"down"),
                 idx:k, desc:"i="+k+" num="+nums[k]+" "+action+"  | cand="+cand+" count="+cnt});
  }
  return {events, states, finalCand:cand};
}

/* ---- formatters ---------------------------------------------------------- */
function fmt(a){
  if(a===null||a===undefined) return "\u2014";
  return "["+a.join(",")+"]";
}
function fmtGroup(leaves){
  if(leaves.length===1) return fmt(leaves[0]);
  return "["+leaves.map(x=>"["+x+"]").join(",")+"]";
}
function escapeHtml(s){ return String(s).replace(/[&<>]/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c])); }

/* ===========================================================================
   State + init
   =========================================================================== */
const INPUTS = {
  p912: [5,2,3,1,6,4],
  p169: [2,2,1,1,1,2,2],
  p023: [[1,4,5],[1,3,4],[2,6]],
};
let state = { mode:"p912", tree:null, lin:null, trace:[], idx:0, timer:null };

function init(){
  document.querySelectorAll(".mode-btn").forEach(b=>{
    b.addEventListener("click", ()=>switchMode(b.dataset.mode));
  });
  document.getElementById("btnStep").addEventListener("click", stepOnce);
  document.getElementById("btnReset").addEventListener("click", reset);
  document.getElementById("btnPlay").addEventListener("click", togglePlay);
  document.getElementById("btnFinish").addEventListener("click", finish);
  switchMode("p912");
  runGoldCheck();
}

function switchMode(mode){
  state.mode=mode; state.idx=0;
  document.querySelectorAll(".mode-btn").forEach(b=>b.classList.toggle("active", b.dataset.mode===mode));
  const P=PROBLEMS[mode];
  document.getElementById("modeSub").textContent = P.sub;
  document.getElementById("stageTitle").textContent = P.title;
  if(P.kind==="tree"){
    const leaves = mode==="p912" ? INPUTS.p912.map(x=>[x]) : INPUTS.p023.map(x=>x.slice());
    state.tree = buildTree(leaves);
    layoutTree(state.tree.root);
    state.trace = state.tree.events;
  } else {
    state.lin = buildMajorityTrace(INPUTS.p169);
    state.trace = state.lin.events;
  }
  renderLegend();
  reset(); runGoldCheck();
}

function reset(){ stopPlay(); state.idx=0; render(); }
function stepOnce(){
  if(state.idx < state.trace.length-1){ state.idx++; render(); }
  else stopPlay();
}
function finish(){ stopPlay(); state.idx=state.trace.length-1; render(); }
function togglePlay(){
  if(state.timer){ stopPlay(); return; }
  document.getElementById("btnPlay").innerHTML="&#10074;&#10074; pause";
  state.timer=setInterval(()=>{
    if(state.idx>=state.trace.length-1){ stopPlay(); return; }
    state.idx++; render();
  }, 750);
}
function stopPlay(){ if(state.timer){ clearInterval(state.timer); state.timer=null; } document.getElementById("btnPlay").innerHTML="&#9658; play"; }

function render(){
  const tr=state.trace;
  document.getElementById("stepNo").textContent = "step "+state.idx+" / "+(tr.length-1);
  if(PROBLEMS[state.mode].kind==="tree") renderTree();
  else renderLinear();
  renderReadout();
  renderLog();
  document.getElementById("btnStep").disabled = state.idx>=tr.length-1;
}

/* ===========================================================================
   Tree rendering (p912, p023)
   =========================================================================== */
const VB_W=1000, VB_H=420, PAD_X=46, PAD_TOP=30, BOX_H=42, LEVEL_H=86;

function renderTree(){
  const svg=document.getElementById("svg");
  svg.setAttribute("viewBox", "0 0 "+VB_W+" "+VB_H);
  const {root, nodes}=state.tree;
  const numLeaves = countLeaves(root);
  const slot = (VB_W - 2*PAD_X) / Math.max(1, numLeaves);
  const maxX = maxDepth(root);
  // x in leaf units -> pixels (centered)
  const px = (leafX)=> PAD_X + (leafX + 0.5) * slot;
  const py = (depth)=> PAD_TOP + depth * LEVEL_H + BOX_H/2;

  const cur = state.trace[state.idx];
  const curNode = cur && cur.node ? cur.node : null;

  let parts=[];
  // edges first (under nodes)
  nodes.forEach(n=>{
    if(n.isLeaf) return;
    const x1=px(n.leafX), y1=py(n.depth)+BOX_H/2;
    const x2=px(n.left.leafX), y2=py(n.left.leafX===n.left.leafX ? n.left.depth : n.left.depth)+BOX_H/2;
    // draw to left and right children
    [[n.left],[n.right]].forEach(arr=>{
      const ch=arr[0];
      const cx=px(ch.leafX), cy=py(ch.depth)-BOX_H/2;
      const both = (n.revealIdx<=state.idx) && (ch.revealIdx<=state.idx);
      const stroke = both ? "#30363d" : "#1f242b";
      const op = both ? 0.9 : 0.4;
      parts.push('<line x1="'+x1+'" y1="'+(py(n.depth)+BOX_H/2)+'" x2="'+cx+'" y2="'+cy+'" stroke="'+stroke+'" stroke-width="1.4" opacity="'+op+'"/>');
    });
  });
  // nodes
  nodes.forEach(n=>{
    const hidden = state.idx < n.revealIdx;
    const done   = state.idx >= n.doneIdx;
    const active = curNode && curNode.id===n.id;
    let label, fillC="#161b22", strokeC="#30363d", txtC="#e6edf3", sw=1.4;
    if(hidden){ label=""; fillC="#0d1117"; strokeC="#1a1f26"; txtC="#3b4250"; }
    else if(done){ label=fmt(n.result); fillC="#0f2e22"; strokeC="#27ae60"; txtC="#27ae60"; sw=2.2; }
    else { label = n.isLeaf ? fmt(n.result) : "\u2026"; txtC="#8b949e"; strokeC="#3a4250"; }
    if(active){ strokeC="#1abc9c"; sw=3; txtC="#1abc9c"; fillC="#103631"; label = (cur.type==="split"||cur.type==="merge") ? (done?fmt(n.result):"\u2026") : label; if(done){txtC="#27ae60";} }
    const cx=px(n.leafX), cy=py(n.depth);
    const w = boxWidthFor(label);
    parts.push('<rect x="'+(cx-w/2)+'" y="'+(cy-BOX_H/2)+'" width="'+w+'" height="'+BOX_H+'" rx="8" fill="'+fillC+'" stroke="'+strokeC+'" stroke-width="'+sw+'"/>');
    if(label) parts.push('<text x="'+cx+'" y="'+(cy+5)+'" text-anchor="middle" font-size="13.5" font-weight="600" fill="'+txtC+'" font-family="SF Mono,Menlo,Consolas,monospace">'+escapeHtml(label)+'</text>');
    // depth tick on the left
    if(!hidden) parts.push('<text x="'+(cx)+'" y="'+(cy-BOX_H/2-5)+'" text-anchor="middle" font-size="9" fill="#48515e">d'+n.depth+'</text>');
  });
  // current event banner
  if(cur){
    const col = cur.type==="merge" ? "#27ae60" : (cur.type==="split" ? "#1abc9c" : "#58a6ff");
    parts.push('<text x="'+(VB_W/2)+'" y="'+(VB_H-10)+'" text-anchor="middle" font-size="12.5" font-weight="700" fill="'+col+'">'+escapeHtml(cur.desc)+'</text>');
  }
  svg.innerHTML = parts.join("");
}
function boxWidthFor(label){
  if(!label) return 40;
  const ch = label.length;
  return Math.max(46, Math.min(150, ch*9 + 18));
}
function countLeaves(n){ return n.isLeaf?1:countLeaves(n.left)+countLeaves(n.right); }
function maxDepth(n){ return n.isLeaf?n.depth:Math.max(maxDepth(n.left),maxDepth(n.right)); }

/* ===========================================================================
   Linear rendering (p169 Boyer-Moore)
   =========================================================================== */
function renderLinear(){
  const svg=document.getElementById("svg");
  svg.setAttribute("viewBox", "0 0 "+VB_W+" "+VB_H);
  const nums=INPUTS.p169; const n=nums.length;
  const slot=(VB_W-2*PAD_X)/Math.max(1,n);
  const cellW=Math.min(slot,84);
  const totalW=cellW*n;
  const x0=PAD_X + ((VB_W-2*PAD_X)-totalW)/2;
  const boxH=56, by=80;
  const cur=state.trace[state.idx];
  const st=state.lin.states[Math.min(state.idx, state.lin.states.length-1)];
  let parts=[];
  // cells
  nums.forEach((val,ci)=>{
    const x=x0+ci*cellW, cx=x+cellW/2;
    const seen = ci<=state.idx;
    const isCand = seen && st.cand===val;
    let fillC="#161b22", strokeC="#30363d", txtC="#e6edf3", sw=1.4;
    if(!seen){ fillC="#0d1117"; strokeC="#1a1f26"; txtC="#3b4250"; }
    if(ci===state.idx){ strokeC="#1abc9c"; sw=2.6; }
    if(isCand && seen){ fillC="#0f2e22"; strokeC="#27ae60"; txtC="#27ae60"; }
    parts.push('<rect x="'+(x+4)+'" y="'+by+'" width="'+(cellW-8)+'" height="'+boxH+'" rx="9" fill="'+fillC+'" stroke="'+strokeC+'" stroke-width="'+sw+'"/>');
    parts.push('<text x="'+cx+'" y="'+(by+boxH/2+6)+'" text-anchor="middle" font-size="19" font-weight="700" fill="'+txtC+'">'+val+'</text>');
    parts.push('<text x="'+cx+'" y="'+(by+boxH+16)+'" text-anchor="middle" font-size="10" fill="#48515e">i='+ci+'</text>');
    if(isCand && seen) parts.push('<text x="'+cx+'" y="'+(by-7)+'" text-anchor="middle" font-size="9.5" font-weight="700" fill="#27ae60">cand</text>');
  });
  // candidate / count meter
  const meterY=210, meterH=26, meterX=PAD_X, meterW=VB_W-2*PAD_X;
  parts.push('<text x="'+meterX+'" y="'+(meterY-8)+'" font-size="11" fill="#8b949e">candidate = <tspan fill="#27ae60" font-weight="700">'+st.cand+'</tspan>   (count value shown by the bar)</text>');
  parts.push('<rect x="'+meterX+'" y="'+meterY+'" width="'+meterW+'" height="'+meterH+'" rx="7" fill="#0a0e14" stroke="#30363d"/>');
  // zero baseline in the middle
  const baseX = meterX + meterW/2;
  parts.push('<line x1="'+baseX+'" y1="'+meterY+'" x2="'+baseX+'" y2="'+(meterY+meterH)+'" stroke="#30363d" stroke-width="1"/>');
  parts.push('<text x="'+baseX+'" y="'+(meterY+meterH+14)+'" text-anchor="middle" font-size="9.5" fill="#6e7681">0</text>');
  // count bar: positive extends right (teal), from baseline
  const maxC = Math.max(3, ...state.lin.states.map(s=>Math.abs(s.cnt)));
  const unit = (meterW/2 - 6) / maxC;
  const cval = st.cnt;
  const col = cval>0 ? "#27ae60" : (cval<0 ? "#c0392b" : "#8b949e");
  const startX = cval>=0 ? baseX : baseX + cval*unit;
  const barW = Math.abs(cval)*unit;
  parts.push('<rect x="'+startX+'" y="'+(meterY+4)+'" width="'+Math.max(0,barW)+'" height="'+(meterH-8)+'" rx="4" fill="'+col+'" opacity="0.85"/>');
  parts.push('<text x="'+(baseX + meterW/2 + 4)+'" y="'+(meterY+meterH/2+4)+'" text-anchor="end" font-size="12" font-weight="700" fill="'+col+'">count = '+cval+'</text>');
  // history trail of counts
  let hx=PAD_X, hy=300;
  parts.push('<text x="'+PAD_X+'" y="'+(hy-8)+'" font-size="11" fill="#8b949e">count trail: '+state.lin.states.slice(0,state.idx+1).map(s=>s.cnt).join(" \u2192 ")+'</text>');
  // event desc
  if(cur){
    parts.push('<text x="'+(VB_W/2)+'" y="'+(VB_H-12)+'" text-anchor="middle" font-size="12.5" font-weight="700" fill="#1abc9c">'+escapeHtml(cur.desc)+'</text>');
  }
  svg.innerHTML=parts.join("");
}

/* ===========================================================================
   Readout + log
   =========================================================================== */
function renderReadout(){
  const el=document.getElementById("readout");
  const cur=state.trace[state.idx];
  let rows=[];
  rows.push(row("mode", state.mode));
  rows.push(row("step", state.idx+" / "+(state.trace.length-1)));
  if(PROBLEMS[state.mode].kind==="tree"){
    const splits=state.tree.events.filter((e,i)=>i<=state.idx && e.type==="split").length;
    const merges=state.tree.events.filter((e,i)=>i<=state.idx && e.type==="merge").length;
    const bases=state.tree.events.filter((e,i)=>i<=state.idx && e.type==="base").length;
    rows.push(row("event type", spanHL(cur.type)));
    rows.push(row("recursion depth", cur.depth));
    rows.push(row("splits so far", splits));
    rows.push(row("merges so far", merges));
    rows.push(row("leaves (base) hit", bases));
    rows.push(row("tree depth (log\u2082 n)", maxDepth(state.tree.root)));
    if(cur.type==="merge" || cur.type==="base"){
      rows.push(rowGD("result", fmt(cur.node.result)));
    }
    if(state.idx>=state.trace.length-1){
      rows.push(rowGD("FINAL", fmt(state.tree.root.result)));
    }
  } else {
    const st=state.lin.states[Math.min(state.idx, state.lin.states.length-1)];
    rows.push(row("i (cursor)", st.i));
    rows.push(row("nums[i]", st.num));
    rows.push(row("action", st.action));
    rows.push(row("candidate", spanGD(st.cand)));
    rows.push(row("count", st.cnt>0?spanGD(st.cnt):(st.cnt<0?spanBD(st.cnt):st.cnt)));
    if(state.idx>=state.trace.length-1){
      rows.push(rowGD("MAJORITY", state.lin.finalCand));
    }
  }
  el.innerHTML = rows.join("");
}
function row(k,v){ return '<div class="row"><span>'+k+'</span><span>'+v+'</span></div>'; }
function rowGD(k,v){ return '<div class="row"><span>'+k+'</span><span class="gd">'+v+'</span></div>'; }
function spanHL(v){ return '<span class="hl">'+v+'</span>'; }
function spanGD(v){ return '<span class="gd">'+v+'</span>'; }
function spanBD(v){ return '<span class="bd">'+v+'</span>'; }

function renderLog(){
  const tr=state.trace;
  const tbl=document.getElementById("logTbl");
  let head="<thead><tr>"+["#","event"].map(h=>"<th>"+h+"</th>").join("")+"</tr></thead>";
  let body="<tbody>";
  tr.forEach((s,i)=>{
    const isLast = (i===tr.length-1);
    const cls = (i===state.idx?"cur ":"") + (isLast?"found":"");
    body += '<tr class="'+cls.trim()+'"><td>'+i+'</td><td>'+escapeHtml(s.desc)+'</td></tr>';
  });
  body+="</tbody>";
  tbl.innerHTML = head+body;
  const cur=tbl.querySelector("tr.cur");
  if(cur) cur.scrollIntoView({block:"nearest"});
}

function renderLegend(){
  const el=document.getElementById("legend");
  if(PROBLEMS[state.mode].kind==="tree"){
    el.innerHTML =
      '<span><span class="dot" style="background:#1abc9c"></span>active node</span>'+
      '<span><span class="dot" style="background:#27ae60"></span>merged result</span>'+
      '<span><span class="dot" style="background:#3a4250"></span>awaiting merge (\u2026)</span>'+
      '<span><span class="dot" style="background:#1a1f26"></span>not yet split</span>';
  } else {
    el.innerHTML =
      '<span><span class="dot" style="background:#1abc9c"></span>current element</span>'+
      '<span><span class="dot" style="background:#27ae60"></span>candidate</span>'+
      '<span><span class="dot" style="background:#c0392b"></span>count &lt; 0 (impossible here)</span>';
  }
}

/* ---- gold check ---------------------------------------------------------- */
function runGoldCheck(){
  const mode=state.mode; const P=PROBLEMS[mode];
  let computed, got="", ok=false;
  try{
    if(mode==="p912"){ computed=mergeSortCalc(INPUTS.p912).join(","); got=computed; ok=computed===P.gold; }
    else if(mode==="p169"){ computed=String(majorityCalc(INPUTS.p169)); got=computed; ok=computed===P.gold; }
    else { computed=mergeKCalc(INPUTS.p023).join(","); got=computed; ok=computed===P.gold; }
  }catch(e){ got="ERROR "+e.message; }
  const badge=document.getElementById("goldBadge");
  badge.className="badge"+(ok?"":" bad");
  badge.textContent = ok ? "[check: OK] \u2713 JS = .py" : "[check: FAIL] "+got;
  badge.title = P.goldLabel + "  |  JS got: "+got;
}

document.addEventListener("DOMContentLoaded", init);
</script>
